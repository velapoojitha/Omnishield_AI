<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SECURE LOGIN | OMNISHIELD AI</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700&family=Orbitron:wght@800&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <style>
        body {
            height: 100vh; display: flex; align-items: center; justify-content: center;
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), 
                        url('/static/loginbg.png') no-repeat center center fixed;
            background-size: cover; margin: 0;
        }
        .login-card {
            background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(15px);
            padding: 40px; border-radius: 25px; width: 100%; max-width: 400px;
            box-shadow: 0 25px 60px rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.4);
            text-align: center;
        }
        .logo-small { font-family: 'Orbitron'; color: #0056b3; font-size: 1.6rem; margin-bottom: 10px; }
        .system-status { font-size: 0.75rem; font-weight: 700; letter-spacing: 1px; margin-bottom: 25px; padding: 5px 15px; border-radius: 50px; display: inline-block; }
        .status-setup { background: #fff3cd; color: #856404; border: 1px solid #ffeeba; }
        .status-login { background: #d1ecf1; color: #0c5460; border: 1px solid #bee5eb; }
        
        label { display: block; text-align: left; font-size: 0.85rem; font-weight: 700; color: #444; margin-bottom: 5px; margin-left: 5px; }
        
        .form-control { border-radius: 12px; padding: 14px; border: 1.5px solid #eee; font-weight: 500; }
        .input-group .form-control { border-top-right-radius: 0; border-bottom-right-radius: 0; border-right: none; }
        
        .input-group-text {
            background: white !important; border: 1.5px solid #eee; border-left: none;
            border-top-right-radius: 12px; border-bottom-right-radius: 12px;
            min-width: 45px; display: flex; justify-content: center; align-items: center; cursor: pointer;
        }

        /* Professional Black Icon Style */
        #toggleIcon {
            color: #000000 !important; font-size: 1.1rem; transition: 0.2s;
        }
        #toggleIcon:hover { color: #0056b3 !important; }

        .btn-login {
            background: #0056b3; color: white; width: 100%; padding: 14px; margin-top: 10px;
            border-radius: 12px; font-weight: 800; border: none; transition: 0.3s;
            text-transform: uppercase; letter-spacing: 1px;
        }
        .btn-login:hover { background: #003d82; transform: translateY(-2px); }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="logo-small">🛡️ OMNISHIELD AI</div>
        
        {% if mode == "setup" %}
            <div class="system-status status-setup">⚙️ FIRST-TIME SETUP MODE</div>
        {% else %}
            <div class="system-status status-login">🔒 SECURE LOGIN ACTIVE</div>
        {% endif %}

        <form action="/verify" method="POST"> 
            <div class="mb-3">
                <label>Operator ID</label>
                <input type="text" name="operator_id" class="form-control" placeholder="Enter Your Name" required>
            </div>
            
            <div class="mb-4 text-start">
                <label class="small fw-bold">Security PIN</label>
                <div class="input-group">
                    <input type="password" id="pinInput" name="pin" class="form-control" placeholder="****" required inputmode="numeric">
                    <span class="input-group-text" onclick="togglePin()">
                        <i class="fas fa-eye-slash" id="toggleIcon"></i>
                    </span>    
                </div>
            </div>
            
            <button type="submit" class="btn-login">
                {% if mode == "setup" %}INITIALIZE SYSTEM{% else %}AUTHORIZE ACCESS{% endif %}
            </button>
        </form>
        
        <p class="mt-4 small text-muted mb-0">Security Lead: <strong>VELA POOJITHA</strong></p>
    </div>

    <script>
    function togglePin() {
        const pinInput = document.getElementById('pinInput');
        const icon = document.getElementById('toggleIcon');
        
        if (pinInput.type === 'password') {
            pinInput.type = 'text';
            icon.classList.replace('fa-eye-slash', 'fa-eye');
        } else {
            pinInput.type = 'password';
            icon.classList.replace('fa-eye', 'fa-eye-slash');
        }
    }
    </script>
</body>
</html>
